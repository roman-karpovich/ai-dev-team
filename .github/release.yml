changelog:
  exclude:
    labels:
      - skip-changelog
      - ignore-for-release
  categories:
    - title: 🚀 Features
      labels:
        - feature
    - title: 🐛 Fixes
      labels:
        - fix
    - title: 🛠️ CI / Ops
      labels:
        - ci
        - chore
    - title: 📖 Docs
      labels:
        - documentation
    - title: ♻️ Refactor
      labels:
        - refactor
    - title: 🧪 Tests
      labels:
        - tests
    - title: 🧹 Other changes
      labels:
        - "*"
